<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2B5C8" />
      <stop offset="100%" stop-color="#D4A373" />
    </linearGradient>
  </defs>

  <!-- Line-art Flower (inspired by brand mark) -->
  <g transform="translate(28,28) scale(0.9)" fill="none" stroke="url(#logo-grad)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top petal -->
    <path d="M0,-8 C-5,-9 -10,-14 -9,-19 C-8,-23 -4,-24 0,-22 C4,-24 8,-23 9,-19 C10,-14 5,-9 0,-8Z"/>
    <!-- Right petal -->
    <path d="M0,-8 C4,-6 10,-6 14,-9 C17,-11 18,-7 16,-4 C13,0 8,1 4,0 C2,0 0,-4 0,-8Z"/>
    <!-- Bottom-right petal -->
    <path d="M4,0 C7,2 10,6 9,10 C8,13 5,14 3,12 C1,10 0,6 0,2Z"/>
    <!-- Bottom-left petal -->
    <path d="M0,2 C0,6 -1,10 -3,12 C-5,14 -8,13 -9,10 C-10,6 -7,2 -4,0Z"/>
    <!-- Left petal -->
    <path d="M-4,0 C-8,1 -13,0 -16,-4 C-18,-7 -17,-11 -14,-9 C-10,-6 -4,-6 0,-8Z"/>
    <!-- Spiral center -->
    <path d="M-1,-5 C2,-6 4,-4 3,-1 C2,1 -1,2 -2,0 C-3,-1 -2,-3 -1,-3"/>
    <!-- Stem -->
    <path d="M0,4 C1,10 0,18 -2,26" stroke-width="1.3"/>
    <!-- Leaf -->
    <path d="M-1,18 C-6,15 -9,17 -6,21 C-4,22 -2,20 -1,18" stroke-width="1.1"/>
  </g>

  <!-- Brand Text -->
  <text x="58" y="35" font-family="'Playfair Display', serif" font-size="26" font-weight="700" font-style="italic" fill="url(#logo-grad)" letter-spacing="1">Vân Hoa</text>
  <text x="58" y="35" font-family="'Playfair Display', serif" font-size="26" font-weight="700" font-style="italic" fill="none" stroke="#D4A373" stroke-width="0.25" letter-spacing="1">Vân Hoa</text>
</svg>
