<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <!-- Gradient for Petals -->
    <linearGradient id="petal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F2B5C8" />
      <stop offset="100%" stop-color="#EDD48E" />
    </linearGradient>
    
    <!-- Pattern for Leather Veins -->
    <pattern id="leather-vein" width="4" height="4" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <path d="M 0,0 L 0,4 M 1,0 L 1,4" stroke="rgba(255,255,255,0.3)" stroke-width="0.5" fill="none"/>
      <path d="M 0,2 L 4,2" stroke="rgba(255,255,255,0.15)" stroke-width="0.3" fill="none"/>
    </pattern>

    <g id="petal">
      <path d="M 0,0 C -8,-15 -18,-25 0,-30 C 18,-25 8,-15 0,0 Z" fill="url(#petal-grad)" stroke="#D4A373" stroke-width="0.5"/>
      <path d="M 0,0 C -8,-15 -18,-25 0,-30 C 18,-25 8,-15 0,0 Z" fill="url(#leather-vein)"/>
      <path d="M 0,0 L 0,-25 M 0,-5 L -5,-15 M 0,-10 L 4,-20" stroke="rgba(255,255,255,0.4)" stroke-width="0.5" fill="none"/>
    </g>
  </defs>

  <!-- Flower -->
  <g transform="translate(30,30) scale(0.85)">
    <use href="#petal" transform="rotate(0)"/>
    <use href="#petal" transform="rotate(72)"/>
    <use href="#petal" transform="rotate(144)"/>
    <use href="#petal" transform="rotate(216)"/>
    <use href="#petal" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="4" fill="#D4A373"/>
    <circle cx="0" cy="0" r="2" fill="#FFF"/>
  </g>

  <!-- Text -->
  <text x="70" y="38" font-family="'Playfair Display', serif" font-size="28" font-weight="700" fill="url(#petal-grad)" letter-spacing="1">Vân Hoa</text>
  <text x="70" y="38" font-family="'Playfair Display', serif" font-size="28" font-weight="700" fill="none" stroke="#D4A373" stroke-width="0.2" letter-spacing="1">Vân Hoa</text>
</svg>
